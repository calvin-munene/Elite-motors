kind = "web"
previewPath = "/"
title = "Premium Car Dealership"
version = "1.0.0"
id = "artifacts/dealership"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22082

[services.development]
run = "pnpm --filter @workspace/dealership run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dealership", "run", "build" ]
publicDir = "artifacts/dealership/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22082"
BASE_PATH = "/"
