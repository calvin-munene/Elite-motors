services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: autoelite
      POSTGRES_PASSWORD: autoelite_dev_password
      POSTGRES_DB: autoelite
    volumes:
      - autoelite_db:/var/lib/postgresql/data
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoelite"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://autoelite:autoelite_dev_password@db:5432/autoelite
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production-please-use-openssl-rand}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
    ports:
      - "8080:8080"
    command: sh -c "pnpm db:push && pnpm db:seed-if-empty && pnpm start"

volumes:
  autoelite_db:
