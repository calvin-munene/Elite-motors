services:
  - type: web
    name: autoelite-motors
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm db:push && pnpm db:seed-if-empty && pnpm build"
    startCommand: "pnpm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
