services:
  - type: web
    name: autoelite-motors
    runtime: node
    region: frankfurt
    plan: free
    # `pnpm start` internally runs db:push-force + db:seed-if-empty + server,
    # so the host doesn't need a custom startCommand to get a working DB.
    # This makes the deploy resilient to Render dashboard overrides — even
    # if the user manually changes the start command, the default works.
    buildCommand: "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm build"
    startCommand: "pnpm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
