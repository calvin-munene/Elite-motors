services:
  - type: web
    name: autoelite-motors
    runtime: node
    region: frankfurt
    plan: free
    # DB sync (push + seed-if-empty) intentionally runs at startup, not during
    # build. Render's build phase can race with the database availability and
    # silently no-op `db:push` (leaving tables uncreated). Running them in the
    # start command guarantees the schema and seed data exist before the
    # server starts handling requests. The seed step is a no-op on subsequent
    # boots because it skips when the cars table already has data.
    buildCommand: "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm build"
    startCommand: "pnpm db:push-force && pnpm db:seed-if-empty && pnpm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
