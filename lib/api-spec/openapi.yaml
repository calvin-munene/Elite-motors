openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Premium Car Dealership API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cars
    description: Car inventory management
  - name: categories
    description: Car categories
  - name: inquiries
    description: Customer inquiries and leads
  - name: bookings
    description: Test drive bookings
  - name: testimonials
    description: Customer testimonials
  - name: blog
    description: Blog posts and news
  - name: team
    description: Team members
  - name: services
    description: Dealership services
  - name: settings
    description: Site settings and content
  - name: admin
    description: Admin authentication and dashboard
  - name: trade-ins
    description: Trade-in submissions
  - name: financing
    description: Financing inquiries
  - name: openai
    description: OpenAI AI chat operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── CARS ───────────────────────────────────────────────────────────────────
  /cars:
    get:
      operationId: listCars
      tags: [cars]
      summary: List cars with filters
      parameters:
        - name: make
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
        - name: yearMin
          in: query
          schema: { type: integer }
        - name: yearMax
          in: query
          schema: { type: integer }
        - name: priceMin
          in: query
          schema: { type: number }
        - name: priceMax
          in: query
          schema: { type: number }
        - name: bodyType
          in: query
          schema: { type: string }
        - name: fuelType
          in: query
          schema: { type: string }
        - name: transmission
          in: query
          schema: { type: string }
        - name: condition
          in: query
          schema: { type: string }
        - name: color
          in: query
          schema: { type: string }
        - name: availability
          in: query
          schema: { type: string }
        - name: featured
          in: query
          schema: { type: boolean }
        - name: category
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [newest, oldest, price_asc, price_desc, mileage_asc, featured]
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: search
          in: query
          schema: { type: string }
        - name: japaneseImport
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: List of cars
          content:
            application/json:
              schema:
                type: object
                properties:
                  cars:
                    type: array
                    items:
                      $ref: "#/components/schemas/Car"
                  total:
                    type: integer
                  offset:
                    type: integer
                  limit:
                    type: integer
                required: [cars, total, offset, limit]
    post:
      operationId: createCar
      tags: [cars]
      summary: Create a new car listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCarBody"
      responses:
        "201":
          description: Created car
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Car"

  /cars/featured:
    get:
      operationId: getFeaturedCars
      tags: [cars]
      summary: Get featured cars for homepage
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 6 }
      responses:
        "200":
          description: Featured cars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Car"

  /cars/stats:
    get:
      operationId: getCarStats
      tags: [cars]
      summary: Get inventory stats for dashboard
      responses:
        "200":
          description: Car statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarStats"

  /cars/makes:
    get:
      operationId: getCarMakes
      tags: [cars]
      summary: Get unique makes in inventory
      responses:
        "200":
          description: List of makes
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /cars/{id}:
    get:
      operationId: getCar
      tags: [cars]
      summary: Get a single car by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Car detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Car"
        "404":
          description: Not found
    put:
      operationId: updateCar
      tags: [cars]
      summary: Update a car
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCarBody"
      responses:
        "200":
          description: Updated car
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Car"
    delete:
      operationId: deleteCar
      tags: [cars]
      summary: Delete a car
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /cars/{id}/slug:
    get:
      operationId: getCarBySlug
      tags: [cars]
      summary: Get car by slug
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Car detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Car"

  /cars/{id}/related:
    get:
      operationId: getRelatedCars
      tags: [cars]
      summary: Get related cars
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer, default: 4 }
      responses:
        "200":
          description: Related cars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Car"

  # ─── INQUIRIES ─────────────────────────────────────────────────────────────
  /inquiries:
    get:
      operationId: listInquiries
      tags: [inquiries]
      summary: List all inquiries
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Inquiries list
          content:
            application/json:
              schema:
                type: object
                properties:
                  inquiries:
                    type: array
                    items:
                      $ref: "#/components/schemas/Inquiry"
                  total:
                    type: integer
                required: [inquiries, total]
    post:
      operationId: createInquiry
      tags: [inquiries]
      summary: Submit a customer inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInquiryBody"
      responses:
        "201":
          description: Created inquiry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"

  /inquiries/{id}:
    get:
      operationId: getInquiry
      tags: [inquiries]
      summary: Get a single inquiry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Inquiry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"
    put:
      operationId: updateInquiry
      tags: [inquiries]
      summary: Update inquiry status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                notes:
                  type: string
              required: [status]
      responses:
        "200":
          description: Updated inquiry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"

  # ─── BOOKINGS ──────────────────────────────────────────────────────────────
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all test drive bookings
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Bookings list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Booking"
                  total:
                    type: integer
                required: [bookings, total]
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Book a test drive
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "201":
          description: Created booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    put:
      operationId: updateBooking
      tags: [bookings]
      summary: Update booking status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                notes:
                  type: string
              required: [status]
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  # ─── TESTIMONIALS ──────────────────────────────────────────────────────────
  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      summary: List testimonials
      parameters:
        - name: published
          in: query
          schema: { type: boolean }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"
    post:
      operationId: createTestimonial
      tags: [testimonials]
      summary: Create a testimonial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestimonialBody"
      responses:
        "201":
          description: Created testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"

  /testimonials/{id}:
    put:
      operationId: updateTestimonial
      tags: [testimonials]
      summary: Update a testimonial
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTestimonialBody"
      responses:
        "200":
          description: Updated testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"
    delete:
      operationId: deleteTestimonial
      tags: [testimonials]
      summary: Delete a testimonial
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ─── BLOG ─────────────────────────────────────────────────────────────────
  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List blog posts
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: published
          in: query
          schema: { type: boolean }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Blog posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/BlogPost"
                  total:
                    type: integer
                required: [posts, total]
    post:
      operationId: createBlogPost
      tags: [blog]
      summary: Create a blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlogPostBody"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"

  /blog/{id}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
    put:
      operationId: updateBlogPost
      tags: [blog]
      summary: Update a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlogPostBody"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
    delete:
      operationId: deleteBlogPost
      tags: [blog]
      summary: Delete a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ─── TEAM ─────────────────────────────────────────────────────────────────
  /team:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List team members
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: createTeamMember
      tags: [team]
      summary: Create a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamMemberBody"
      responses:
        "201":
          description: Created team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/{id}:
    put:
      operationId: updateTeamMember
      tags: [team]
      summary: Update a team member
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamMemberBody"
      responses:
        "200":
          description: Updated team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: deleteTeamMember
      tags: [team]
      summary: Delete a team member
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ─── SERVICES ─────────────────────────────────────────────────────────────
  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List dealership services
      responses:
        "200":
          description: Services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceBody"
      responses:
        "201":
          description: Created service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    put:
      operationId: updateService
      tags: [services]
      summary: Update a service
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceBody"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ─── SETTINGS ─────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  # ─── ADMIN ─────────────────────────────────────────────────────────────────
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required: [username, password]
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  admin:
                    $ref: "#/components/schemas/AdminUser"
                required: [token, admin]
        "401":
          description: Unauthorized

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin user
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized

  /admin/dashboard:
    get:
      operationId: getDashboardStats
      tags: [admin]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # ─── TRADE-INS ────────────────────────────────────────────────────────────
  /trade-ins:
    get:
      operationId: listTradeIns
      tags: [trade-ins]
      summary: List trade-in submissions
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Trade-ins
          content:
            application/json:
              schema:
                type: object
                properties:
                  tradeIns:
                    type: array
                    items:
                      $ref: "#/components/schemas/TradeIn"
                  total:
                    type: integer
                required: [tradeIns, total]
    post:
      operationId: createTradeIn
      tags: [trade-ins]
      summary: Submit a trade-in request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTradeInBody"
      responses:
        "201":
          description: Created trade-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeIn"

  # ─── FINANCING ────────────────────────────────────────────────────────────
  /financing:
    get:
      operationId: listFinancingInquiries
      tags: [financing]
      summary: List financing inquiries
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Financing inquiries
          content:
            application/json:
              schema:
                type: object
                properties:
                  inquiries:
                    type: array
                    items:
                      $ref: "#/components/schemas/FinancingInquiry"
                  total:
                    type: integer
                required: [inquiries, total]
    post:
      operationId: createFinancingInquiry
      tags: [financing]
      summary: Submit a financing inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFinancingInquiryBody"
      responses:
        "201":
          description: Created financing inquiry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancingInquiry"

  # ─── OPENAI CHAT ─────────────────────────────────────────────────────────────
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /openai/conversations/{id}/messages:
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Car:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        make:
          type: string
        model:
          type: string
        trim:
          type: string
          nullable: true
        year:
          type: integer
        price:
          type: number
        discountedPrice:
          type: number
          nullable: true
        mileage:
          type: integer
        engineSize:
          type: string
          nullable: true
        transmission:
          type: string
        fuelType:
          type: string
        drivetrain:
          type: string
          nullable: true
        bodyType:
          type: string
        seats:
          type: integer
          nullable: true
        doors:
          type: integer
          nullable: true
        color:
          type: string
        stockNumber:
          type: string
          nullable: true
        vin:
          type: string
          nullable: true
        condition:
          type: string
